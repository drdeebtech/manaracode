services:
  backend:
    build: ./backend
    image: ghcr.io/drdeebtech/manaracode-backend:latest
    expose:
      - "8080"
    volumes:
      - contacts-data:/data
    environment:
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - NOTIFY_TO=${NOTIFY_TO:-}
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ghcr.io/drdeebtech/manaracode-frontend:latest
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      backend:
        # service_started, NOT service_healthy: the SPA is static and must serve
        # even if the API is degraded (nginx only 502s for /api). Gating the whole
        # site on backend health let an unhealthy backend block the frontend from
        # ever updating, freezing production.
        condition: service_started
    restart: unless-stopped

volumes:
  contacts-data:
