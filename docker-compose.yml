services:
  backend:
    build: ./backend
    # IMAGE_TAG is set per-deploy (commit SHA) in /opt/manaracode/.env so a deploy
    # pins an exact, revertable image; falls back to :latest for local/manual use.
    image: ghcr.io/drdeebtech/manaracode-backend:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    volumes:
      - contacts-data:/data
    environment:
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - NOTIFY_TO=${NOTIFY_TO:-}
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ghcr.io/drdeebtech/manaracode-frontend:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      backend:
        # service_started, NOT service_healthy: the SPA is static and must serve
        # even if the API is degraded (nginx only 502s for /api). Gating the whole
        # site on backend health let an unhealthy backend block the frontend from
        # ever updating, freezing production.
        condition: service_started
    restart: unless-stopped

volumes:
  contacts-data:
