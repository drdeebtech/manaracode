server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't disclose the nginx version.
    server_tokens off;

    # Security headers (apply to every response — no location below re-declares
    # add_header, so these are inherited). TLS is terminated at Cloudflare; the
    # HSTS header passes through to the browser over HTTPS and is honored there.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: the built HTML has no inline scripts, so script-src is 'self' (no
    # 'unsafe-inline'). Styles need 'unsafe-inline' for framer-motion/GSAP inline
    # style attributes; Google Fonts needs its stylesheet + font origins.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # SPA fallback — all non-file paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service on the compose network.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
