name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image SHA to roll back to (e.g. a prior commit SHA). Leave empty to build + deploy current main."
        required: false
        default: ""

# Serialize deploys: never let two pushes to main race on the same EC2 host.
# Do not cancel an in-progress deploy mid-flight (a half-applied deploy is worse
# than a queued one) — let it finish, then run the next.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # security-scan + build run only when building (push, or dispatch with no
  # image_tag). A rollback (dispatch with image_tag) reuses an image already in
  # GHCR, so it skips straight to deploy.
  security-scan:
    name: Security Scan
    if: ${{ github.event_name == 'push' || github.event.inputs.image_tag == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0        # full history so gitleaks can scan all commits
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact

  build-and-push:
    name: Build and Push Images
    if: ${{ github.event_name == 'push' || github.event.inputs.image_tag == '' }}
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./frontend
          push: true
          # Immutable SHA tag (for pin/rollback) + moving latest.
          tags: |
            ghcr.io/${{ github.repository_owner }}/manaracode-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/manaracode-frontend:latest

      - name: Build and push backend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/manaracode-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/manaracode-backend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # Run on a normal build (needs succeeded) AND on a rollback (build skipped
    # because image_tag was provided). Only bail if the build actually failed.
    if: ${{ always() && needs.build-and-push.result != 'failure' && needs.build-and-push.result != 'cancelled' }}
    # Needs packages:read so the GITHUB_TOKEN can pull the images from GHCR.
    permissions:
      contents: read
      packages: read
    # The exact tag to deploy: a non-empty workflow_dispatch image_tag (rollback)
    # wins, otherwise this commit's SHA.
    env:
      IMAGE_TAG: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag) || github.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/manaracode/

      - name: Pull images and restart
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        # GITHUB_TOKEN is NOT a default runner env var — it must be mapped here so
        # `envs:` can forward a non-empty value to the remote docker login.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/manaracode
            # Persist the deployed tag in .env (compose reads it) WITHOUT clobbering
            # other vars like SMTP_* — upsert the IMAGE_TAG line only.
            touch .env
            grep -v '^IMAGE_TAG=' .env > .env.tmp 2>/dev/null || true
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.tmp
            mv .env.tmp .env
            # .env holds secrets (SMTP_PASS, TURNSTILE_SECRET) — keep it owner-only.
            # The mv above replaces the file with default (umask) perms each deploy,
            # so re-assert 600 every time.
            chmod 600 .env
            echo "Deploying IMAGE_TAG=${IMAGE_TAG}"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d --no-build --remove-orphans
            docker image prune -f
            docker compose ps
            # Post-deploy health gate: fail the deploy (instead of reporting a
            # false success) if the site isn't actually serving after restart.
            echo "Verifying frontend is serving..."
            for i in $(seq 1 20); do
              if curl -fsS -o /dev/null http://127.0.0.1:8000/; then
                echo "Frontend healthy after deploy"
                exit 0
              fi
              sleep 3
            done
            echo "Health gate FAILED: frontend not serving 60s after deploy"
            docker compose ps
            docker compose logs --tail=80
            exit 1
