name: CI

# Runs on pull requests into main. Validates code before merge.
# Deploy (build + push + EC2) is handled separately by deploy.yml on push to main.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits in the PR
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: go vet
        working-directory: backend
        run: go vet ./...
      - name: go build
        working-directory: backend
        run: go build ./...
      - name: go test
        working-directory: backend
        run: go test ./...

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
